name: Kripto Sinyalleri

# Her 30 dakikada bir çalışır. Bilgisayarın kapalıyken bile GitHub'ın
# sunucusunda çalışır — tamamen ücretsiz.
on:
  schedule:
    - cron: "*/30 * * * *"   # her 30 dakika
  workflow_dispatch: {}        # GitHub'dan elle "Run" butonu için

# Aynı anda iki tarama çakışmasın (durum dosyası bozulmasın)
concurrency:
  group: signals
  cancel-in-progress: false

# Durum dosyasını (state/) repoya geri yazabilmek için yazma izni
permissions:
  contents: write

jobs:
  sinyal-tara:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Sinyalleri tara ve Telegram'a gönder
        env:
          # Bu değerler GitHub'da "Secrets" olarak saklanır (kod içinde DEĞİL).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py signals

      - name: Durumu (state) repoya kaydet
        # Sinyal durumu ve performans kaydı çalışmalar arası korunsun
        run: |
          git config user.name "trader-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ || true
          if git diff --staged --quiet; then
            echo "Durum değişmedi, commit gerekmiyor."
          else
            git commit -m "durum güncelleme (otomatik) [skip ci]"
            git push
          fi
